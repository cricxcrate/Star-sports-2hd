<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CricxCrate – Star Sports 1 English</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:linear-gradient(180deg,#f8fafc,#eef2f7);
  color:#111827;
  user-select:none;
}
body.popup-active .main-content > :not(.player-wrap){
  filter:blur(6px);
  pointer-events:none;
}
.glass{
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.45);
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}
.top-bar{
  max-width:950px;
  margin:14px auto;
  padding:14px;
  text-align:center;
  font-weight:600;
  border-radius:18px;
}
.player-wrap{
  max-width:950px;
  margin:0 auto;
  background:#000;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 14px 30px rgba(0,0,0,.15);
  position: relative;
  aspect-ratio: 16/9;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.section{
  max-width:950px;
  margin:14px auto;
  padding:18px;
  border-radius:20px;
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}
.section h3{
  width:100%;
  text-align:center;
  margin:0 0 6px;
  font-size:16px;
  font-weight:600;
}
.btn{
  background:rgba(255,255,255,.9);
  color:#00a8e1;
  padding:12px 22px;
  border-radius:16px;
  font-weight:600;
  border:1px solid rgba(0,0,0,.08);
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  transition: transform 0.2s ease;
}
.btn.primary{
  background:#00a8e1;
  color:#fff;
  border:none;
}
.btn:active{
  transform:scale(.95);
}
.banner{
  max-width:950px;
  margin:20px auto;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  font-size:20px;
  font-weight:600;
  border-radius:22px;
}
.banner img{width:36px}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.popup-box{
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(18px);
  padding:28px 22px;
  border-radius:26px;
  text-align:center;
  max-width:340px;
  width:90%;
  border:1px solid rgba(255,255,255,.5);
  box-shadow:0 25px 50px rgba(0,0,0,.2);
}
.popup-box h2{margin:0 0 8px}
.popup-box p{margin:0 0 18px;color:#6b7280}
.popup-box a,
.popup-box button{
  display:block;
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:none;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
}
.popup-join{background:#00a8e1;color:#fff}
.popup-done{background:rgba(255,255,255,.9);color:#00a8e1}
</style>
</head>

<body oncontextmenu="return false">

<div class="popup" id="popup">
  <div class="popup-box">
    <h2>Welcome 🤩</h2>
    <p>Join Telegram for live match updates</p>
    <a class="popup-join" href="Https://t.me/+t991_pRD-zs5NzY1" target="_blank">Join Channel</a>
    <button class="popup-done" onclick="closePopup()">Already Joined</button>
  </div>
</div>

<div class="main-content">
  <div class="top-bar glass">CricxCrate • Star Sports 1 English</div>

  <div class="player-wrap">
    <iframe id="video-player"
            src="https://jiogo.pages.dev/?id=1106" 
            referrerpolicy="no-referrer"
            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" 
            allow="autoplay; encrypted-media; fullscreen" 
            allowfullscreen></iframe>
  </div>

  <div class="section glass">
    <h3>⚡ Join Telegram For Live Updates</h3>
    <a class="btn primary" href="Https://t.me/+t991_pRD-zs5NzY1" target="_blank">Join Telegram</a>
    <a class="btn" href="https://t.me/CricxCratelinks" target="_blank">All Channels</a>
  </div>

  <div class="section glass">
    <h3>❤️ Share & Support</h3>
    <button class="btn primary" onclick="sharePage()">Share</button>
    <button class="btn" onclick="copyLink()">Copy Link</button>
    <button class="btn" onclick="refreshPlayer()">Refresh Stream</button>
  </div>

  <a href="Https://t.me/+t991_pRD-zs5NzY1" target="_blank" style="text-decoration:none;color:inherit">
    <div class="banner glass">
      <img src="https://telegram.org/img/t_logo.png">
      Join Channel
    </div>
  </a>
</div>

<script>
/* UI LOGIC */
const popup = document.getElementById("popup");

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
}

function sharePage(){
  if(navigator.share){
    navigator.share({
      title: "Star Sports 1 English Live – CricxCrate", 
      url: location.href
    });
  }
}

function refreshPlayer() {
  const iframe = document.getElementById('video-player');
  const currentSrc = iframe.src;
  iframe.src = '';
  iframe.src = currentSrc;
}

function closePopup(){
  popup.style.opacity="0";
  setTimeout(()=>{
    popup.style.display="none";
    document.body.classList.remove("popup-active");
    // Using a specific key for English to avoid popup conflicts
    sessionStorage.setItem("joined_english","yes");
  },300);
}

if(sessionStorage.getItem("joined_english") !== "yes"){
  document.body.classList.add("popup-active");
} else {
  popup.style.display = "none";
}

/* ANTI-REDIRECT SCRIPT */
window.onbeforeunload = function() {
    return null; 
};
</script>

</body>
</html>
